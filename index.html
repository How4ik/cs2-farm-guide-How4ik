<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Гайд по ферме CS</title>
  <link rel="icon" href="/favicon.png" type="image/png">
  <link rel="apple-touch-icon" href="/favicon.png">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/docsify/themes/dark.css">
  <link rel="stylesheet" href="styles/docsify.css">
  <link rel="stylesheet" href="styles/access.css">
</head>
<body>
  <div id="access-gate" class="access-gate hidden">
    <div class="access-card">
      <h1>Доступ к гайду</h1>
      <p>Введите персональный ключ. Один ключ работает только на одном устройстве.</p>
      <form id="access-form">
        <label for="access-key">Ключ доступа</label>
        <input id="access-key" name="key" type="text" autocomplete="off" spellcheck="false" placeholder="XXXX-XXXX-XXXX" required>
        <button id="access-submit" type="submit">Войти</button>
        <div id="access-error" class="access-error" role="alert"></div>
      </form>
    </div>
  </div>

  <div id="app"></div>

  <aside class="guide-mascot" aria-hidden="true">
    <img src="/mascot-pointer.png" alt="" width="220" height="293" decoding="async">
  </aside>

  <script src="access/config.js"></script>
  <script src="access/login.js"></script>
</body>
</html>
