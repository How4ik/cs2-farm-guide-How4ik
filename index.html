<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Гайд по ферме CS</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/docsify/themes/dark.css">
  <link rel="stylesheet" href="styles/docsify.css">
  <link rel="stylesheet" href="styles/access.css">
</head>
<body>
  <div id="access-gate" class="access-gate hidden">
    <div class="access-card">
      <h1>Доступ к гайду</h1>
      <p>Введите персональный ключ. Один ключ работает только на одном устройстве.</p>
      <form id="access-form">
        <label for="access-key">Ключ доступа</label>
        <input id="access-key" name="key" type="text" autocomplete="off" spellcheck="false" placeholder="XXXX-XXXX-XXXX" required>
        <button id="access-submit" type="submit">Войти</button>
        <div id="access-error" class="access-error" role="alert"></div>
      </form>
    </div>
  </div>

  <div id="app"></div>

  <script src="access/config.js"></script>
  <script>
    function getBasePath() {
      if (!location.hostname.endsWith('github.io')) return '/';
      var match = location.pathname.match(/^\/([^/]+)\/?/);
      if (match && match[1] !== 'index.html') return '/' + match[1] + '/';
      return '/';
    }

    function bootDocsify() {
      if (window.__docsifyBooted) return;
      window.__docsifyBooted = true;

      window.$docsify = {
        name: 'Гайд по ферме CS',
        repo: '',
        basePath: getBasePath(),
        relativePath: true,
        loadSidebar: true,
        subMaxLevel: 0,
        auto2top: true,
        search: {
          placeholder: 'Поиск...',
          noData: 'Ничего не найдено',
          depth: 3
        }
      };

      var docsifyScript = document.createElement('script');
      docsifyScript.src = 'https://cdnjs.cloudflare.com/ajax/libs/docsify/4.13.1/docsify.min.js';
      docsifyScript.onload = function () {
        var searchScript = document.createElement('script');
        searchScript.src = 'https://cdnjs.cloudflare.com/ajax/libs/docsify/4.13.1/plugins/search.min.js';
        document.body.appendChild(searchScript);
      };
      document.body.appendChild(docsifyScript);
    }

    window.addEventListener('guide-auth-ok', bootDocsify, { once: true });
  </script>
  <script src="access/login.js"></script>
</body>
</html>
